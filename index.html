let app=null,model=null,core=null,params=[],action=null,mouthUntil=0;
let v={Param:0,Param2:0,ParamMouthOpenY:0,ParamMouthForm:0,ParamBreath:0,ParamBodyAngleX:0,ParamBodyAngleY:0,ParamBodyAngleZ:0,ParamAngleX:0,ParamAngleY:0,ParamAngleZ:0,ParamEyeBallX:0,ParamEyeBallY:0};
function cls(){if(window.PIXI&&PIXI.live2d&&PIXI.live2d.Live2DModel)return PIXI.live2d.Live2DModel;if(window.Live2DModel)return window.Live2DModel;return null}
function idToString(id){if(id==null)return"";if(typeof id==="string")return id;if(id.s)return id.s;if(id.id)return id.id;if(id._id)return id._id;return String(id)}
function collect(){core=model&&model.internalModel&&model.internalModel.coreModel;let out=[];try{for(let i=0;i<core.getParameterCount();i++)out.push({index:i,id:idToString(core.getParameterId(i))})}catch(e){}return out.filter(p=>p.id)}
function find(id){return params.find(p=>p.id===id)}
function setParam(id,val){const p=find(id);try{if(core&&core.setParameterValueById)core.setParameterValueById(id,Number(val))}catch(e){}try{if(p&&core&&core.setParameterValue)core.setParameterValue(p.index,Number(val))}catch(e){}}
function speak(text,duration=1900){speechText.textContent=text;mouthUntil=performance.now()+duration}
function startAction(name,text){action={name,start:performance.now()};if(text)speak(text,2300)}
function stopAction(){action=null;placeModel()}
function placeModel(){if(!model||!app)return;const w=app.renderer.width,h=app.renderer.height;model.scale.set(h<720?0.073:0.088);model.x=w*0.50;model.y=h*(h<720?0.64:0.60);if(model.anchor)model.anchor.set(0.5,0.92)}

function motion(){if(!model)return;const now=performance.now(),t=now/1000;zero();v.ParamBreath=Math.sin(t*2)*.45;v.ParamBodyAngleZ=Math.sin(t*1.15)*2;v.ParamAngleZ=Math.sin(t*1.15)*.8;v.ParamAngleX=Math.sin(t*.8)*1.1;v.ParamAngleY=Math.sin(t*.9)*1;v.ParamEyeBallX=v.ParamAngleX/30;v.ParamEyeBallY=v.ParamAngleY/30;v.Param=-24+Math.sin(t*1.25+.8)*.7;v.Param2=-24+Math.sin(t*1.3)*.7;if(now<mouthUntil){v.ParamMouthOpenY=(Math.sin(t*18)>0)?1:.12;v.ParamMouthForm=Math.sin(t*8)*.65}
if(action){const a=(now-action.start)/1000;if(action.name==="bow"){const b=Math.sin(Math.min(1,a/1.25)*Math.PI);v.ParamAngleY=-12*b;v.ParamBodyAngleX=-7*b;v.Param=-24+8*b;v.Param2=-24+8*b;if(a>1.35)stopAction()}if(action.name==="wave"){const b=Math.sin(a*10);v.Param=10+b*16;v.Param2=-24+Math.sin(a*5)*4;v.ParamBodyAngleZ=Math.sin(a*4)*5;if(a>1.8)stopAction()}if(action.name==="jump"){const b=Math.max(0,Math.sin(a*Math.PI*2.2));const base=app.renderer.height*(app.renderer.height<720?.64:.60);model.y=base-b*18;model.scale.y=model.scale.x*(1+b*.05);v.Param=-24+b*18;v.Param2=-24+b*18;if(a>1.1){model.scale.y=model.scale.x;stopAction()}}}apply();requestAnimationFrame(motion)}
function showFallback(reason){console.warn("Live2D fallback:",reason);canvas.style.display="none";fallback.style.display="block";loading.style.display="none";speak("ただいまイラストのはちまんがご案内するのです。",2400)}

 {id:"kirishima",hullNo:"DDG-174",officialUrl:"https://www.mod.go.jp/msdf/equipment/ships/ddg/kongo/",icon:"kirishima_badge.png",name:"きりしま",catch:"仲間と駆け抜ける熱き武者",quote:"金剛の志を胸に！共に駆け抜けるぜ！",desc:"熱さと親しみやすさを併せ持つ武者。仲間を鼓舞し、苦しい場面でも前向きな空気を作ります。",shipName:"護衛艦「きりしま」",shipDesc:"海上自衛隊のこんごう型イージス護衛艦。艦隊を空からの脅威から守ります。",f1:["分類","こんごう型"],f2:["役割","防空"],detail:"イージスシステムを備え、広い範囲を監視しながら艦隊の防空を担う護衛艦です。"},
 {id:"teruzuki",hullNo:"DD-116",officialUrl:"https://www.mod.go.jp/msdf/equipment/ships/dd/akizuki/",icon:"teruzuki_badge.png",name:"てるづき",catch:"月の加護を届ける武者",quote:"月の加護をあなたへ！ママー！見ててね♪",desc:"明るく愛らしい雰囲気を持つ武者。月の光のような優しさで、仲間の心を照らします。",shipName:"護衛艦「てるづき」",shipDesc:"海上自衛隊のあきづき型護衛艦。ほかの艦艇を守る防空任務を得意とします。",f1:["分類","あきづき型"],f2:["象徴","月の光"],detail:"周囲の艦艇を守るための能力を備え、護衛隊の防空を支える役割を担います。"},
 {id:"amagiri",hullNo:"DD-154",officialUrl:"https://www.mod.go.jp/msdf/equipment/ships/dd/asagiri/",icon:"amagiri_badge.png",name:"あまぎり",catch:"天霧を晴らし未来を照らす武者",quote:"天霧晴らし、我ここに！",desc:"視界を覆う霧を晴らすように、仲間の不安を取り除く武者。未来へ向かう道を照らします。",shipName:"護衛艦「あまぎり」",shipDesc:"海上自衛隊のあさぎり型護衛艦。長く多様な任務を支えてきた汎用護衛艦です。",f1:["分類","あさぎり型"],f2:["印象","霧を晴らす"],detail:"長年の運用を通して培われた経験を持ち、さまざまな海上任務に従事してきました。"},
 {id:"yuugiri",hullNo:"DD-153",officialUrl:"https://www.mod.go.jp/msdf/equipment/ships/dd/asagiri/",icon:"yuugiri_badge.png",name:"ゆうぎり",catch:"夕霧の静けさをまとう武者",quote:"静かな時ほど、周りをよく見るんだ。",desc:"静かな観察眼を持つ武者。騒がしい状況でも落ち着きを失わず、仲間の安全を見守ります。",shipName:"護衛艦「ゆうぎり」",shipDesc:"海上自衛隊のあさぎり型護衛艦。多様な任務に対応する汎用護衛艦です。",f1:["分類","あさぎり型"],f2:["象徴","夕霧"],detail:"艦名が表す夕方の霧のように、静かで落ち着いた印象を武者の個性にも反映しています。"},
 {id:"hashidate",hullNo:"ASY-91",officialUrl:"https://www.mod.go.jp/msdf/equipment/ships/asy/hashidate/",icon:"hashidate_badge.png",name:"はしだて",catch:"皆を迎えるおもてなし武者",quote:"おかえりなさいませ♪ご無事で何よりです。",desc:"帰ってきた仲間を温かく迎える武者。おもてなしと気配りで、艦隊八幡社に安らぎをもたらします。",shipName:"特務艇「はしだて」",shipDesc:"海上自衛隊の特務艇。迎賓や式典支援など、一般の護衛艦とは異なる役割を担います。",f1:["分類","特務艇"],f2:["役割","迎賓・支援"],detail:"来賓を迎えるための設備を備え、海上での公式行事や交流を支える特色ある艦艇です。"},
 {id:"chiyoda",hullNo:"ASR-404",officialUrl:"https://www.mod.go.jp/msdf/equipment/ships/asr/chiyoda/",icon:"chiyoda_badge.png",name:"ちよだニキ",catch:"仲間を救い支える頼れる武者",quote:"困った時は任せな。ちゃんと連れて帰るぜ。",desc:"豪快で面倒見の良い支援武者。危険な場所へも迷わず向かい、仲間を守り連れ帰ります。",shipName:"潜水艦救難艦「ちよだ」",shipDesc:"海上自衛隊の潜水艦救難艦。潜水艦の乗員救助や関連作業を支援します。",f1:["分類","潜水艦救難艦"],f2:["役割","救難支援"],detail:"深い海で万一の事態が起きた際に、救難活動を行うための装備と能力を備えています。"}

function getJstDateKey(){const parts=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date());const o={};parts.forEach(x=>o[x.type]=x.value);return `${o.year}-${o.month}-${o.day}`}
function randomPick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function loadSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")}catch(e){return null}}
function saveResult(data){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch(e){console.warn("保存できませんでした",e)}}
function createTodayResult(){const musha=randomPick(mushaList),fortune=randomPick(fortunes);return {date:getJstDateKey(),mushaId:musha.id,fortune:fortune.name,message:fortune.message,line:fortune.line,lucky:randomPick(luckyItems),createdAt:Date.now()}}
function findMusha(id){return mushaList.find(x=>x.id===id)||mushaList[0]}
function renderResult(data,isRevisit=false){const m=findMusha(data.mushaId);document.getElementById("fortuneText").textContent=data.fortune;document.getElementById("fortuneMessage").textContent=data.message;document.getElementById("luckyItem").textContent=data.lucky;document.getElementById("todayNote").textContent=isRevisit?"本日はすでにご縁を受け取っています。同じ結果を何度でも見直せます。":"今日の運勢と応援武者を保存しました。日本時間の午前0時に新しいご縁へ更新されます。";document.getElementById("mushaIcon").src=`musha_icon/${m.icon}`;document.getElementById("mushaIcon").alt=`${m.name}のアイコン`;document.getElementById("mushaName").textContent=m.name;document.getElementById("mushaCatch").textContent=m.catch;document.getElementById("mushaQuote").textContent=`「${m.quote}」`;document.getElementById("mushaDesc").textContent=m.desc;document.getElementById("hullNo").textContent=m.hullNo||"";document.getElementById("shipName").textContent=m.shipName;document.getElementById("shipDesc").textContent=m.shipDesc;const officialLink=document.getElementById("officialLink");if(m.officialUrl){officialLink.href=m.officialUrl;officialLink.classList.remove("disabled");officialLink.textContent="海上自衛隊公式ページを見る"}else{officialLink.href="#";officialLink.classList.add("disabled");officialLink.textContent="公式ページ準備中"};document.getElementById("factLabel1").textContent=m.f1[0];document.getElementById("factValue1").textContent=m.f1[1];document.getElementById("factLabel2").textContent=m.f2[0];document.getElementById("factValue2").textContent=m.f2[1];document.getElementById("shipDetail").textContent=m.detail;document.getElementById("badgeBtn").setAttribute("aria-label",`${m.name}の応援メッセージを聞く`);document.getElementById("detailPanel").classList.remove("open");document.getElementById("detailBtn").textContent="もう少し詳しく見る";document.getElementById("intro").style.display="none";document.getElementById("result").classList.add("show");document.getElementById("screen").scrollTop=0;window.currentResult=data;window.currentMusha=m}
function makeCharm(i){const c=document.createElement("div");c.className="charm fly";c.style.left=(12+Math.random()*76)+"%";c.style.animationDelay=(i*.08)+"s";document.querySelector(".app").appendChild(c);setTimeout(()=>c.remove(),1700)}
function drawOmikuji(){const saved=loadSaved(),today=getJstDateKey();if(saved&&saved.date===today){renderResult(saved,true);startAction("wave",`本日のご縁はすでにお届け済みなのです。応援武者は、${findMusha(saved.mushaId).name}なのです♪`);return}const data=createTodayResult();saveResult(data);startAction("bow","鈴を鳴らして、今日のご縁をお届けするのです。");for(let i=0;i<10;i++)makeCharm(i);setTimeout(()=>document.getElementById("flash").classList.add("on"),650);setTimeout(()=>{renderResult(data,false);startAction("wave",`${data.fortune}なのです。本日の応援武者は、${findMusha(data.mushaId).name}なのです♪`)},1100);setTimeout(()=>document.getElementById("flash").classList.remove("on"),1600)}
function prepareInitialState(){const saved=loadSaved(),today=getJstDateKey();if(saved&&saved.date===today){document.getElementById("drawBtn").textContent="今日のご縁を見る";document.querySelector("#intro h2").textContent="本日のご縁はお届け済み";document.querySelector("#intro p").innerHTML="今日のおみくじは、何度でも同じ結果を<br>見直すことができるのです。"}else{document.getElementById("drawBtn").textContent="おみくじを引く"}}
document.getElementById("drawBtn").onclick=drawOmikuji;
document.getElementById("againBtn").onclick=()=>{document.getElementById("screen").scrollTop=0;const d=window.currentResult,m=window.currentMusha;if(d&&m)startAction("wave",`今日のご縁は、${d.fortune}なのです。${m.name}と共に進むのです♪`)};
document.getElementById("homeBtn").onclick=()=>startAction("bow","ホームへ戻る導線は、正式公開版で接続するのです。");
document.getElementById("badgeBtn").onclick=()=>{const m=window.currentMusha;if(m)startAction("wave",`${m.name}なのです。${m.quote}`)};
document.getElementById("detailBtn").onclick=()=>{const p=document.getElementById("detailPanel"),b=document.getElementById("detailBtn");p.classList.toggle("open");b.textContent=p.classList.contains("open")?"説明を閉じる":"もう少し詳しく見る";setTimeout(()=>document.getElementById("screen").scrollTo({top:document.getElementById("screen").scrollHeight,behavior:"smooth"}),80)};
document.querySelector(".app").addEventListener("pointerdown",e=>{if(e.target.closest("button,a,.badgeWrap"))return;startAction("jump","今日も来てくれてうれしいのです。");});
prepareInitialState();
init();
</script>
