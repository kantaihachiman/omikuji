const megamiDescriptions={"izanami":"日本神話に登場する母なる神。\n国生み・神生みを行った神として広く知られています。\n優しい京ことばで、頑張り続ける者の心をそっと休ませます。\n今日は無理をせず、自分自身にも優しくすることを教えてくれます。","amaterasu":"日本神話の最高神。\n太陽を司り、人々を明るく照らす神として信仰されています。\n日の光と秩序を司り、進むべき道を照らす女神です。\n厄災を祓い、困難へ立ち向かう勇気と、勝利へ向かう力を授けます。\n迷った時にも、進むべき道には必ず光があることを教えてくれます。","kikuri":"菊理媛神 白山信仰の女神。\n人と人、心と心のご縁を結ぶ女神です。\nやわらかな金沢ことばで、「なんとかなる」と明るく背中を押してくれます。\n今日の出会いやつながりを大切にすることで、思いがけない助けが訪れるかもしれません。","toyotama":"豊玉姫命（とよたまひめのみこと）\n海神の娘とされる女神。\n海や豊穣、生命を象徴し、海の恵みと生命の循環を見守る女神です。\n大きな海のような包容力を持ち、焦らず自分の歩幅で進む大切さを伝えてくれます。\n今日は急ぐよりも、心を穏やかに整えることが、良い流れにつながります。","teruzuki":"アルテミス\nギリシャ神話に登場する月の女神。\n月や自然、狩猟を司る神として知られています。\n護衛艦「てるづき」の艦章にも月の意匠が描かれています。","shirase5002":"木花之佐久夜毘売（このはなのさくやびめ）\n桜の花のように美しく咲き誇る、日本神話の女神。\n生命や繁栄を象徴し、長い旅路を歩む者たちを、温かな食事とともに見守ります。","shirase5003":"木花之佐久夜毘売（このはなのさくやびめ）\n日本神話に登場する花の女神。\n新しい出会いや豊かな実りを見守り、未知の世界へ踏み出す好奇心を応援します。","ybun":"各地におたよりをお届けする妖精さん。\n艦隊八幡社オリジナルキャラクター。\nY文とは、かつて存在した横須賀文書交換所に由来します。","mitama":"宇迦之御魂神（うかのみたまのかみ）\n五穀豊穣・食物を司る神。\n全国のお稲荷様の御祭神として広く信仰されています。\n「さあ、お膳の支度が整いましたえ。今日もみなさんへ、美味しいお料理をお届けしますえ。」\n食の恵みを届け、人々の暮らしと健康を優しく見守る神様です。","denden":"電電明神\n通信や情報を見守る存在として親しまれています。\nまた、虚空蔵菩薩とも深い関わりを持ち、知恵や記憶を授ける存在として信仰されています。\n艦隊八幡社では、いかづちと同じ雷族の少女。\n四本の腕を自在に操り、通信や情報処理で仲間たちを支えます。","otome":"神々に仕え、人々へ神託や祝福を届ける巫女。\n艦隊八幡社オリジナルキャラクター。\n名前はイタリア製艦砲オート・メラーラ76mm速射砲に由来しています。","hashidate":"おもてなし艦、はしだての妖精さん。\n艦隊八幡社オリジナルキャラクター。\nはしだてのスイーツは絶品のようです。\n妖精さんのご加護でしょうか？"};
const luckyItems=["温かいお茶","青い小物","お気に入りの帽子","甘いお菓子","磨いた靴","小さな手帳","白いハンカチ","海を感じる音楽","よく使うペン","丸いもの","温かい食事","昔から大切にしている物"];
const fortunes={musha:["神威大吉","武運吉","出陣吉","突破吉","鍛錬吉"],megami:["花開吉","安寧吉","ご縁吉","癒し吉","恵み吉"]};
const messages={musha:"今日は前へ進む力が満ちています。応援武者の言葉を胸に、一歩踏み出しましょう。",megami:"今日は心を整えるご縁の日です。女神の言葉を受け取り、ゆるやかに過ごしましょう。"};
const SAVE_KEY="kantai_omikuji_v06_save";
const specialPairs={
  "izumo__izanami":{title:"母神と総大将",message:"母神イザナミの慈愛と、総大将いずもの勇気が、今日の歩みを見守ります。"},
  "maya__amaterasu":{title:"忠義と陽光",message:"揺るぎない忠義と日の光が、迷いのない一歩を授けます。"},
  "mogami__kikuri":{title:"黒獅子と結びの神",message:"黒獅子の突破力と良きご縁が、未来への道を切り拓きます。"},
  "kumano__amaterasu":{title:"八咫烏の導き",message:"八咫烏の導きと太陽の光が、進むべき道を明るく照らします。"},
  "akizuki__teruzuki":{title:"ふたつの月",message:"秋の月と照る月が重なり、静かな加護があなたを包みます。"},
  "amagiri__ybun":{title:"霧晴らす励まし",message:"霧を晴らす力と優しい励ましが、焦らず進む勇気をくれます。"},
  "yuugiri__mitama":{title:"夕暮れの安らぎ",message:"夕霧の静けさと心を休める言葉が、穏やかな時間を授けます。"},
  "ikazuchi__amaterasu":{title:"雷光の加護",message:"雷鳴と陽光が重なり、迷いを断ち切る力が満ちています。"},
  "kirishima__toyotama":{title:"熱意と海の恵み",message:"熱き心を海の穏やかさが支え、何度でも立ち上がる力となります。"},
  "chiyoda__hashidate":{title:"支えと帰る場所",message:"仲間を支える力と、帰りを待つ優しさが、今日の安心を守ります。"}
};
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function todayJST(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo"}).format(new Date())}
function emptySave(){return{version:1,lastDate:todayJST(),today:{musha:null,megami:null},discoveredMusha:[],discoveredMegami:[],discoveredPairs:[],history:[]}}
function loadSave(){let d;try{d=JSON.parse(localStorage.getItem(SAVE_KEY)||"null")}catch(e){}if(!d||typeof d!=="object")d=emptySave();d.today=d.today||{musha:null,megami:null};d.discoveredMusha=Array.isArray(d.discoveredMusha)?d.discoveredMusha:[];d.discoveredMegami=Array.isArray(d.discoveredMegami)?d.discoveredMegami:[];d.discoveredPairs=Array.isArray(d.discoveredPairs)?d.discoveredPairs:[];d.history=Array.isArray(d.history)?d.history:[];if(d.lastDate!==todayJST()){d.lastDate=todayJST();d.today={musha:null,megami:null};saveData(d)}return d}
function saveData(d){localStorage.setItem(SAVE_KEY,JSON.stringify(d))}
let save=loadSave();
function character(type,id){const list=type==="musha"?musha:megami;return list.find(x=>x.id===id)||null}
function registerUnique(arr,val){if(!arr.includes(val)){arr.push(val);return true}return false}
function pairInfo(){if(!save.today.musha||!save.today.megami)return null;const key=`${save.today.musha.id}__${save.today.megami.id}`;return{key,m:character("musha",save.today.musha.id),g:character("megami",save.today.megami.id),special:specialPairs[key]||null}}
function registerPair(){const p=pairInfo();if(!p)return false;const isNew=registerUnique(save.discoveredPairs,p.key);if(isNew){save.history.unshift({date:todayJST(),pair:p.key});save.history=save.history.slice(0,30)}saveData(save);return isNew}
function updateHomeStatus(showNew=false){const ms=save.today.musha?character("musha",save.today.musha.id):null,gs=save.today.megami?character("megami",save.today.megami.id):null;document.getElementById("mushaStatus").textContent=ms?`${ms.name}（済）`:"未使用";document.getElementById("megamiStatus").textContent=gs?`${gs.name}（済）`:"未使用";const p=pairInfo(),box=document.getElementById("pairBox"),badge=document.getElementById("newBadge");if(p){box.classList.add("show");document.getElementById("pairNames").textContent=`⚔ ${p.m.name} × 🌸 ${p.g.name}`;document.getElementById("pairMessage").textContent=p.special?`【${p.special.title}】${p.special.message}`:"二つのご縁が結ばれました。今日一日、力と安らぎが共にあります。";badge.classList.toggle("show",showNew)}else{box.classList.remove("show");badge.classList.remove("show")}}
function showSection(name){document.getElementById("intro").style.display=name==="intro"?"block":"none";document.getElementById("result").classList.toggle("show",name==="result");document.getElementById("collection").classList.toggle("show",name==="collection");document.getElementById("panel").scrollTop=0}
function draw(type){if(window.drawBusy)return;window.drawBusy=true;let data=save.today[type];let isFresh=false;if(!data){const c=pick(type==="musha"?musha:megami);data={id:c.id,fortune:pick(fortunes[type]),lucky:pick(luckyItems)};save.today[type]=data;registerUnique(type==="musha"?save.discoveredMusha:save.discoveredMegami,c.id);saveData(save);isFresh=true}const list=type==="musha"?musha:megami,c=list.find(x=>x.id===data.id)||list[0];if(isFresh){startAction("bow","今日のご縁を授けるのです。");playHachimanDrawEffect(type)}setTimeout(()=>{showSection("result");revealResult();const tag=document.getElementById("typeTag"),head=document.getElementById("cardHead");tag.className=`typeTag ${type}`;head.className=`cardHead ${type}`;tag.textContent=type==="musha"?"⚔ 武者みくじ":"🌸 女神くじ";document.getElementById("fortune").textContent=data.fortune;document.getElementById("message").textContent=messages[type];document.getElementById("role").textContent=c.role;document.getElementById("name").textContent=c.name;document.getElementById("quote").textContent=`「${c.quote}」`;if(!data.lucky){data.lucky=pick(luckyItems);saveData(save)}document.getElementById("luckyItem").textContent=data.lucky;const d=type==="musha"?mushaDetails[c.id]:null;const card=document.getElementById("resultCard"),shipBox=document.getElementById("shipBox");card.classList.toggle("characterOnly",type!=="musha");document.getElementById("characterDesc").textContent=type==="musha"?(d?.desc||c.role):(megamiDescriptions[c.id]||c.role);if(d){shipBox.style.display="block";document.getElementById("hullNo").textContent=d.hullNo||"";document.getElementById("shipName").textContent=d.shipName||"";document.getElementById("shipDesc").textContent=d.shipDesc||"";document.getElementById("factLabel1").textContent=d.f1?.[0]||"分類";document.getElementById("factValue1").textContent=d.f1?.[1]||"";document.getElementById("factLabel2").textContent=d.f2?.[0]||"役割";document.getElementById("factValue2").textContent=d.f2?.[1]||"";document.getElementById("shipDetail").textContent=d.detail||"";const link=document.getElementById("officialLink");if(d.officialUrl){link.href=d.officialUrl;link.classList.remove("disabled");link.textContent="海上自衛隊公式ページを見る"}else{link.href="#";link.classList.add("disabled");link.textContent="公式ページ準備中"}}else{shipBox.style.display="none"}document.getElementById("detailPanel").classList.remove("open");document.getElementById("detailBtn").textContent="もう少し詳しく見る";document.getElementById("icon").src=(type==="musha"?"musha_icon/":"megami_icon/")+c.icon;document.getElementById("icon").alt=c.name;document.getElementById("note").textContent=isFresh?"本日のご縁を記録しました。同じ種類のおみくじは、日本時間の午前0時まで同じ結果です。":"本日すでに結ばれたご縁を再表示しています。";let newPair=false;if(save.today.musha&&save.today.megami)newPair=registerPair();updateHomeStatus(newPair);const p=pairInfo(),isSpecial=!!p?.special;document.getElementById("pairBox").classList.toggle("special",isSpecial);if(isSpecial&&newPair){setTimeout(playSpecialDrawEffect,500);startAction("wave","これは特別なご縁なのです！ 新しいご縁が結ばれたのです♪")}else if(newPair){startAction("wave","新しい組み合わせのご縁なのです♪")}else if(isFresh){startAction("wave",`${c.name}とのご縁なのです♪`)}else{startAction("wave","今日は同じ結果なのです。何度でも見直せるのです♪")}endHachimanDrawEffect();window.drawBusy=false},isFresh?4200:0)}
function openCollection(){document.getElementById("mushaCount").textContent=`${save.discoveredMusha.length} / ${musha.length}`;document.getElementById("megamiCount").textContent=`${save.discoveredMegami.length} / ${megami.length}`;document.getElementById("pairCount").textContent=`${save.discoveredPairs.length} / ${musha.length*megami.length}`;document.getElementById("specialCount").textContent=save.discoveredPairs.filter(k=>specialPairs[k]).length;const h=document.getElementById("history");h.innerHTML=save.history.length?"<strong>最近結ばれたご縁</strong>"+save.history.map(x=>{const [m,g]=x.pair.split("__"),mc=character("musha",m),gc=character("megami",g),sp=specialPairs[x.pair];return `<div>${x.date}　⚔ ${mc?.name||m} × 🌸 ${gc?.name||g}${sp?`<br>✨ ${sp.title}`:""}</div>`}).join(""):"<div>まだ組み合わせの記録はありません。</div>";showSection("collection");speak("これまでに結ばれたご縁なのです。",1800)}
document.getElementById("mushaBtn").onclick=()=>draw("musha");
document.getElementById("megamiBtn").onclick=()=>draw("megami");
document.getElementById("backBtn").onclick=()=>{showSection("intro");updateHomeStatus(false);speak("もう一つのご縁も結べるのです。",1800)};
document.getElementById("collectionBtn").onclick=openCollection;
document.getElementById("collectionBackBtn").onclick=()=>{showSection("intro");updateHomeStatus(false);speak("本日のご縁をお選びください。",1600)};
document.getElementById("resetAllBtn").onclick=()=>{if(confirm("ご縁の記録をすべて初期化しますか？\nこの操作は元に戻せません。")){save=emptySave();saveData(save);updateHomeStatus(false);openCollection();speak("すべての記録を初期化したのです。",1600)}};
document.getElementById("detailBtn").onclick=()=>{const p=document.getElementById("detailPanel"),b=document.getElementById("detailBtn");p.classList.toggle("open");b.textContent=p.classList.contains("open")?"説明を閉じる":"もう少し詳しく見る";setTimeout(()=>document.getElementById("panel").scrollTo({top:document.getElementById("panel").scrollHeight,behavior:"smooth"}),80)};
document.getElementById("iconWrap").onclick=()=>{const type=document.getElementById("typeTag").classList.contains("musha")?"musha":"megami",data=save.today[type],c=data?character(type,data.id):null;if(c)startAction("wave",`${c.name}なのです。${c.quote}`)};
document.getElementById("homeBtn").onclick=()=>{startAction("bow","ゲームセンターへ戻るのです♪");setTimeout(()=>location.href="https://kantaihachiman.github.io/game-center/",650)};
document.querySelector(".app").addEventListener("pointerdown",e=>{if(e.target.closest("button,a"))return;startAction("jump","今日も来てくれてうれしいのです。")});
updateHomeStatus(false);init();
</script>
