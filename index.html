<!DOCTYPE html>

<style>

*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;background:radial-gradient(circle at 50% 10%,#7d3a3f 0,#3a1014 48%,#18070a 100%);color:var(--paper)}
.app{position:relative;width:min(100vw,520px);height:100dvh;margin:auto;overflow:hidden;border-inline:1px solid #d8b65a55}.version{position:absolute;right:10px;top:8px;font-size:10px;opacity:.72;z-index:40}.title{position:absolute;top:22px;left:0;right:0;text-align:center;z-index:5}.title small{letter-spacing:.25em;color:#ffe9a4}.title h1{margin:5px 0;font-size:clamp(27px,8vw,42px);letter-spacing:.1em;color:var(--gold);text-shadow:0 3px 0 #4b2116,0 0 18px #ffd66a66}.torii{position:absolute;top:94px;left:9%;right:9%;height:145px;opacity:.65}.torii:before,.torii:after{content:"";position:absolute;left:0;right:0;height:17px;border-radius:8px;background:linear-gradient(#d34d3c,#861616)}.torii:after{top:30px;left:8%;right:8%;height:13px}.pillar{position:absolute;top:38px;width:15px;height:110px;background:linear-gradient(90deg,#7a1616,#d44a38,#7a1616)}.pillar.l{left:22%}.pillar.r{right:22%}#stage{position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none}.fallback{display:none;position:absolute;left:50%;top:235px;transform:translateX(-50%);height:min(42dvh,300px);max-width:56%;object-fit:contain;z-index:3;filter:drop-shadow(0 16px 14px #0008)}.loading{position:absolute;top:445px;left:50%;transform:translateX(-50%);font-size:12px;opacity:.7}.speech{position:absolute;top:136px;left:22px;right:22px;z-index:20;background:#fff9e9f2;color:var(--ink);border:3px solid #70401e;border-radius:18px;padding:10px 15px;box-shadow:0 7px 0 #0003;font-weight:800;line-height:1.5}.speech small{display:block;color:#8b5a33;font-size:11px}.panel{position:absolute;left:12px;right:12px;bottom:12px;z-index:30;max-height:53dvh;overflow:auto;background:#fff9eaf7;color:var(--ink);border:4px solid #70401e;border-radius:23px;padding:14px;box-shadow:0 10px 0 #0004}.intro{text-align:center}.intro h2{margin:0 0 5px;color:#891b22}.intro p{margin:0 0 12px;font-weight:800;line-height:1.5}.choiceGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choice{border:0;border-radius:18px;padding:16px 8px 14px;font-family:inherit;font-weight:900;font-size:18px;cursor:pointer;color:#fff;box-shadow:0 6px 0 #0004}.choice span{display:block;font-size:12px;margin-top:5px;opacity:.9}.choice.musha{background:linear-gradient(#b42d35,#71131c)}.choice.megami{background:linear-gradient(#da7194,#9d355f)}.choice:active,.btn:active{transform:translateY(3px)}.result{display:none;text-align:center}.result.show{display:block}.typeTag{display:inline-block;padding:5px 14px;border-radius:999px;color:#fff;font-weight:900;margin-bottom:7px}.typeTag.musha{background:var(--red)}.typeTag.megami{background:var(--pink)}.fortune{font-size:27px;font-weight:900;color:#941f27;margin:2px 0 7px}.msg{font-weight:800;line-height:1.6;margin-bottom:10px}.card{overflow:hidden;border:3px solid #a36d2b;border-radius:18px;background:#fff}.cardHead{display:grid;grid-template-columns:94px 1fr;gap:12px;align-items:center;padding:12px;color:#fff;text-align:left}.cardHead.musha{background:linear-gradient(135deg,#69121a,#b92d37)}.cardHead.megami{background:linear-gradient(135deg,#8f3156,#d26f91)}.iconWrap{width:92px;height:92px;border-radius:50%;padding:5px;background:radial-gradient(circle,#fff8d1,#d8aa45 68%,#6e3c17 70%);box-shadow:0 0 0 3px #ffefaa99}.iconWrap img{width:100%;height:100%;object-fit:contain;border-radius:50%}.name{font-size:24px;font-weight:900}.role{font-size:12px;color:#ffe6a9;font-weight:900;margin-bottom:3px}.quote{padding:14px;background:#fff8e5;color:#6e211d;font-weight:900;line-height:1.65}.note{font-size:11px;color:#76552f;background:#efe4c8;border-radius:10px;padding:7px;margin-top:9px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px}.btn{border:0;border-radius:13px;padding:11px 7px;font-family:inherit;font-weight:900;color:#fff;cursor:pointer;background:var(--green);box-shadow:0 4px 0 #1d3b30}.btn.home{background:#9a2029;box-shadow:0 4px 0 #64151b}.flash{position:absolute;inset:0;z-index:28;pointer-events:none}.flash.on{animation:flash .8s}@keyframes flash{35%{background:#fff0aacc}}@media(max-height:720px){.title{top:12px}.torii{top:72px}.speech{top:108px;font-size:13px}.panel{max-height:55dvh;padding:11px}.fallback{top:190px}.loading{top:390px}.iconWrap{width:78px;height:78px}.cardHead{grid-template-columns:80px 1fr}.name{font-size:21px}}
</style>

<body>
<div class="app">
<div class="version">Ver0.5 二つのご縁・動作確認版</div>
<div class="title"><small>艦隊八幡社</small><h1>今日のご縁</h1></div>
<div class="torii"><div class="pillar l"></div><div class="pillar r"></div></div>
<canvas id="stage"></canvas><img id="fallback" class="fallback" src="hachi_chara.png" alt="はちまん"><div id="loading" class="loading">Live2D はちまん読込中…</div>
<div class="speech"><small>はちまん</small><span id="speechText">今日はどちらになさいますか？</span></div><div id="flash" class="flash"></div>
<div class="panel" id="panel">
<section id="intro" class="intro"><h2>本日のご縁を選ぶ</h2><p>いま必要な力に合わせて、<br>二つのおみくじから選ぶのです。</p><div class="choiceGrid"><button id="mushaBtn" class="choice musha">⚔ 武者みくじ<span>力を授かる</span></button><button id="megamiBtn" class="choice megami">🌸 女神くじ<span>心を整える</span></button></div></section>
<section id="result" class="result"><div id="typeTag" class="typeTag"></div><div id="fortune" class="fortune"></div><div id="message" class="msg"></div><div class="card"><div id="cardHead" class="cardHead"><div class="iconWrap"><img id="icon" alt=""></div><div><div id="role" class="role"></div><div id="name" class="name"></div></div></div><div id="quote" class="quote"></div></div><div id="note" class="note"></div><div class="buttons"><button id="backBtn" class="btn">選び直す</button><button id="homeBtn" class="btn home">ホームへ戻る</button></div></section>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
<script>
const MODEL_PATH="export/hachiman.model3.json",canvas=document.getElementById("stage"),fallback=document.getElementById("fallback"),loading=document.getElementById("loading"),speechText=document.getElementById("speechText");let app=null,model=null,core=null,params=[],action=null,mouthUntil=0;let v={Param:0,Param2:0,ParamMouthOpenY:0,ParamMouthForm:0,ParamBreath:0,ParamBodyAngleX:0,ParamBodyAngleY:0,ParamBodyAngleZ:0,ParamAngleX:0,ParamAngleY:0,ParamAngleZ:0,ParamEyeBallX:0,ParamEyeBallY:0};
function cls(){return window.PIXI&&PIXI.live2d&&PIXI.live2d.Live2DModel?PIXI.live2d.Live2DModel:window.Live2DModel||null}function idToString(id){return id==null?"":typeof id==="string"?id:id.s||id.id||id._id||String(id)}function collect(){core=model?.internalModel?.coreModel;let out=[];try{for(let i=0;i<core.getParameterCount();i++)out.push({index:i,id:idToString(core.getParameterId(i))})}catch(e){}return out.filter(p=>p.id)}function find(id){return params.find(p=>p.id===id)}function setParam(id,val){const p=find(id);try{core?.setParameterValueById?.(id,Number(val))}catch(e){}try{if(p)core?.setParameterValue?.(p.index,Number(val))}catch(e){}}function speak(text,d=1900){speechText.textContent=text;mouthUntil=performance.now()+d}function startAction(name,text){action={name,start:performance.now()};if(text)speak(text,2300)}function placeModel(){if(!model||!app)return;const w=app.renderer.width,h=app.renderer.height;model.scale.set(h<720?.073:.088);model.x=w*.5;model.y=h*(h<720?.64:.60);model.anchor?.set(.5,.92)}function zero(){Object.keys(v).forEach(k=>v[k]=0)}function apply(){Object.keys(v).forEach(k=>setParam(k,v[k]))}
function motion(){if(!model)return;const now=performance.now(),t=now/1000;zero();v.ParamBreath=Math.sin(t*2)*.45;v.ParamBodyAngleZ=Math.sin(t*1.15)*2;v.ParamAngleZ=Math.sin(t*1.15)*.8;v.ParamAngleX=Math.sin(t*.8)*1.1;v.ParamAngleY=Math.sin(t*.9);v.ParamEyeBallX=v.ParamAngleX/30;v.ParamEyeBallY=v.ParamAngleY/30;v.Param=-24+Math.sin(t*1.25+.8)*.7;v.Param2=-24+Math.sin(t*1.3)*.7;if(now<mouthUntil){v.ParamMouthOpenY=Math.sin(t*18)>0?1:.12;v.ParamMouthForm=Math.sin(t*8)*.65}if(action){const a=(now-action.start)/1000;if(action.name==="bow"){const b=Math.sin(Math.min(1,a/1.25)*Math.PI);v.ParamAngleY=-12*b;v.ParamBodyAngleX=-7*b;if(a>1.35)action=null}else if(action.name==="wave"){v.Param=10+Math.sin(a*10)*16;v.ParamBodyAngleZ=Math.sin(a*4)*5;if(a>1.8)action=null}}apply();requestAnimationFrame(motion)}
async function init(){try{const C=cls();if(!C)throw Error("Live2D library not found");app=new PIXI.Application({view:canvas,resizeTo:document.querySelector(".app"),transparent:true,resolution:1});model=await Promise.race([C.from(MODEL_PATH,{autoInteract:false}),new Promise((_,r)=>setTimeout(()=>r(Error("timeout")),6000))]);app.stage.addChild(model);params=collect();placeModel();loading.style.display="none";window.addEventListener("resize",()=>setTimeout(placeModel,120));motion();speak("今日はどちらになさいますか？",2200)}catch(e){canvas.style.display="none";fallback.style.display="block";loading.style.display="none";speak("イラストのはちまんがご案内するのです。",2200)}}
const musha=[
{id:"izumo",name:"いずも",role:"武者艦隊を率いる総大将",icon:"izumo_badge.png",quote:"恐れることはない。我が共にある。今日という戦、胸を張って参ろう。"},
{id:"maya",name:"まや",role:"総大将を支える忠義の右腕",icon:"maya_badge.png",quote:"忠義は厚く、心は友。仲間を信じ、自分も信じるのだ。"},
{id:"mogami",name:"もがみ",role:"黒獅子の牙を持つ武者",icon:"mogami_badge.png",quote:"迷いは断ち切る。今日も黒獅子の牙が道を切り開こう。"},
{id:"murasame",name:"むらさめ",role:"疾風のごとく駆ける兄武者",icon:"murasame_badge.png",quote:"疾風迅雷！思い立ったその時こそ、最高の出陣日和だ！"},
{id:"amagiri",name:"あまぎり",role:"天霧を晴らす武者",icon:"amagiri_badge.png",quote:"霧はやがて晴れる。焦らず一歩ずつ進もう。"},
{id:"yuugiri",name:"ゆうぎり",role:"夕霧の静けさをまとう武者",icon:"yuugiri_badge.png",quote:"夕暮れは終わりではない。明日への始まりだ。"},
{id:"ikazuchi",name:"いかづち",role:"雷雲の加護を受けし武者",icon:"ikazuchi_badge.png",quote:"雷鳴のごとく突き進め！迷いを断ち切るのだ！"},
{id:"kirishima",name:"きりしま",role:"失敗を恐れぬ熱き武者",icon:"kirishima_badge.png",quote:"間違えてもいい！失敗してもいい！立ち上がる者が最後に勝つんだぜ！"},
{id:"kumano",name:"くまの",role:"八咫烏に導かれし武者",icon:"kumano_badge.png",quote:"八咫烏が道を示す。今日は良き巡り合わせとなるだろう。"},
{id:"akizuki",name:"あきづき",role:"仲間の背を守る防空武者",icon:"teruzuki_badge.png",quote:"背は我らが守る。安心して前へ進め。"},
{id:"akebono",name:"あけぼの",role:"夜明けを告げる武者",icon:"akebono.png",quote:"夜明けは必ず訪れる。今日という一日を、共に切り拓こう。"},
{id:"chiyoda",name:"ちよだニキ",role:"仲間を救い支える武者",icon:"chiyoda_badge.png",quote:"支える者こそ真の力。焦らず整えれば必ず勝機は訪れる。"}
];
const megami=[
{id:"izanami",name:"イザナミ",role:"母なる癒し",icon:"izumo_icon.png",quote:"よう頑張ったなぁ。今日は少ぉし肩の力を抜いてええんやで。"},
{id:"amaterasu",name:"アマテラス",role:"日の光と希望",icon:"amaterasu_icon.png",quote:"あなたを照らす光は、いつもここにあります。"},
{id:"kikuri",name:"キクリヒメ",role:"ご縁を結ぶ女神",icon:"kikuri_icon.png",quote:"なんとかなるがいね♪ ご縁が味方してくれるさけ。"},
{id:"toyotama",name:"トヨタマ",role:"海の恵みと穏やかさ",icon:"toyotama_icon.png",quote:"焦らんでええちゃが。今日はゆっくりいこうね。"},
{id:"teruzuki",name:"てるづき",role:"月の加護",icon:"teruzuki_icon.png",quote:"Ἐμπρός（エンブロス）♪ 月の加護をあなたへ。今日も笑顔でいきましょう♪"},
{id:"shirase5002",name:"5002しらせ",role:"美味しい食事と英気",icon:"5002konoha_icon.png",quote:"美味しいご飯は、長い航海の元気の源です。今日は少し贅沢してもいいんですよ。"},
{id:"shirase5003",name:"5003しらせ",role:"新しい味との出会い",icon:"5003konoha_icon.png",quote:"世界はまだまだ広いですよ♪ 今日は食べたことのない美味しいものに出会えるかもしれませんね！"},
{id:"ybun",name:"Y文",role:"やさしい少女の励まし",icon:"ybun_icon.png",quote:"あわてなくても大丈夫だよ。ひとつずつ進めば、ちゃんとできるからね♪"},
{id:"mitama",name:"みたま",role:"心を休ませる京ことば",icon:"mitama_icon.png",quote:"無理したらあきまへんえ。今日は心も、ゆっくり休ませてあげておくれやす。"},
{id:"denden",name:"でんでん",role:"ご縁をつなぐ関西娘",icon:"denden_icon.png",quote:"任しとき！通信も、ご縁も、うちがしっかり繋いどくで！"},
{id:"otome",name:"乙女ララ",role:"笑顔を届ける京ことば",icon:"otome_icon.png",quote:"そない気張らんでも、ええんどすえ。今日はゆるりと笑っておくれやす♪"},
{id:"hashidate",name:"はしだて",role:"おかえりを告げる女神",icon:"hashidate_icon.png",quote:"おかえりなさいませ♪ ご無事で何よりです。今日はゆっくり休んでくださいね。"}
];
const fortunes={musha:["神威大吉","武運吉","出陣吉","突破吉","鍛錬吉"],megami:["花開吉","安寧吉","ご縁吉","癒し吉","恵み吉"]};const messages={musha:"今日は前へ進む力が満ちています。応援武者の言葉を胸に、一歩踏み出しましょう。",megami:"今日は心を整えるご縁の日です。女神の言葉を受け取り、ゆるやかに過ごしましょう。"};
function pick(a){return a[Math.floor(Math.random()*a.length)]}function key(t){return `kantai_omikuji_v05_${t}_${new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo"}).format(new Date())}`}function draw(type){let data;try{data=JSON.parse(localStorage.getItem(key(type))||"null")}catch(e){}if(!data){const c=pick(type==="musha"?musha:megami);data={id:c.id,fortune:pick(fortunes[type])};localStorage.setItem(key(type),JSON.stringify(data))}const list=type==="musha"?musha:megami,c=list.find(x=>x.id===data.id)||list[0];document.getElementById("intro").style.display="none";document.getElementById("result").classList.add("show");const tag=document.getElementById("typeTag"),head=document.getElementById("cardHead");tag.className=`typeTag ${type}`;head.className=`cardHead ${type}`;tag.textContent=type==="musha"?"⚔ 武者みくじ":"🌸 女神くじ";document.getElementById("fortune").textContent=data.fortune;document.getElementById("message").textContent=messages[type];document.getElementById("role").textContent=c.role;document.getElementById("name").textContent=c.name;document.getElementById("quote").textContent=`「${c.quote}」`;document.getElementById("icon").src=(type==="musha"?"musha_icon/":"megami_icon/")+c.icon;document.getElementById("icon").alt=c.name;document.getElementById("note").textContent="同じ種類のおみくじは、日本時間の午前0時まで同じ結果です。";document.getElementById("panel").scrollTop=0;startAction("wave",`${c.name}とのご縁なのです♪`);document.getElementById("flash").classList.add("on");setTimeout(()=>document.getElementById("flash").classList.remove("on"),900)}
document.getElementById("mushaBtn").onclick=()=>draw("musha");document.getElementById("megamiBtn").onclick=()=>draw("megami");document.getElementById("backBtn").onclick=()=>{document.getElementById("result").classList.remove("show");document.getElementById("intro").style.display="block";speak("今日はどちらになさいますか？",1800)};document.getElementById("homeBtn").onclick=()=>{startAction("bow","ゲームセンターへ戻るのです♪");setTimeout(()=>location.href="https://kantaihachiman.github.io/game-center/",650)};init();
</script>
